# generated by go-github-pipelines v1.3.0
# GitHub Actions CI/CD Pipeline for notebook
# Meeting and Notes Management App with Tailscale Integration
# Go version is read from go.mod (go-version-file) — no manual sync required

name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CGO_ENABLED: "0"

jobs:
  # ============================================================================
  # LINT - Code Quality and Formatting
  # ============================================================================
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Task
        uses: arduino/setup-task@c0bc642852239c2689f73f4ea6459c29405f3c52  # v3.0.0
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build frontend (required for go:embed)
        run: task build:frontend

      - name: Run frontend linter
        run: task lint:frontend

      - name: Install golangci-lint
        # renovate: datasource=go depName=github.com/golangci/golangci-lint/v2
        # NOTE: If golangci-lint releases v3, update the module path to .../v3/cmd/golangci-lint@vX.Y.Z
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2

      - name: Run golangci-lint
        run: task lint

      - name: Check Go formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "The following files are not formatted:"
            echo "$unformatted"
            echo ""
            echo "Run 'gofmt -w .' to fix formatting"
            exit 1
          fi
          echo "All files are properly formatted"

  # ============================================================================
  # TEST - Unit Tests with Per-file Coverage Enforcement
  # ============================================================================
  test:
    name: Test
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: "1"  # Required for race detector
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Task
        uses: arduino/setup-task@c0bc642852239c2689f73f4ea6459c29405f3c52  # v3.0.0
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download dependencies
        run: go mod download

      - name: Build frontend (required for go:embed)
        run: task build:frontend

      - name: Run tests with per-file coverage enforcement
        run: task test:coverage RACE=-race

      - name: Generate human-readable coverage report
        run: go tool cover -func=coverage.out | tee coverage-report.txt

      - name: Upload coverage artifact
        if: always()  # Upload even when coverage gate fails (for debugging)
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: |
            coverage.out
            coverage-report.txt
          retention-days: 30

  # ============================================================================
  # BUILD - Frontend and Backend
  # ============================================================================
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Task
        uses: arduino/setup-task@c0bc642852239c2689f73f4ea6459c29405f3c52  # v3.0.0
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download Go dependencies
        run: go mod download

      - name: Build with Task
        run: task build

      - name: Verify binary
        run: |
          ./notebook --help || true
          echo "Binary verification complete"

  # ============================================================================
  # SECURITY - govulncheck Vulnerability Scanner with ignore-list gate
  # (gosec is integrated in golangci-lint via .golangci.yml)
  # ============================================================================
  govulncheck:
    name: Security (govulncheck)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Task
        uses: arduino/setup-task@c0bc642852239c2689f73f4ea6459c29405f3c52  # v3.0.0
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build frontend (required for go:embed)
        run: task build:frontend

      - name: Install govulncheck
        # v1.4.0 panics on generics (x/tools@v0.46.0 ForEachElement bug) — do not bump until a fixed release is confirmed
        # renovate: datasource=go depName=golang.org/x/vuln
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.6.0

      - name: Run govulncheck with ignore-list gate
        run: |
          govulncheck -json ./... > vulncheck_output.json 2>&1; GOVULN_EXIT=$?
          # exit 0 = clean, exit 3 = vulnerabilities found (handled below), other = tool error
          if [ "$GOVULN_EXIT" -ne 0 ] && [ "$GOVULN_EXIT" -ne 3 ]; then
            echo "::error::govulncheck failed with exit code ${GOVULN_EXIT} (binary missing, network error, or parse failure)"
            exit "$GOVULN_EXIT"
          fi

          FOUND_VULNS=$(grep -oP '"finding":\{"osv":"GO-[^"]*"' vulncheck_output.json \
            | grep -oP 'GO-[^"]*' | sort -u)

          if [ -z "$FOUND_VULNS" ]; then
            echo "No vulnerabilities found."
            exit 0
          fi

          echo "Vulnerabilities detected:"
          echo "$FOUND_VULNS"

          IGNORED=""
          if [ -f .govulncheck-ignore ]; then
            IGNORED=$(grep -v '^#' .govulncheck-ignore | grep -v '^$' | sort -u)
          fi

          UNIGNORED=$(comm -23 <(echo "$FOUND_VULNS") <(echo "$IGNORED"))

          if [ -z "$UNIGNORED" ]; then
            echo "All found vulnerabilities are in .govulncheck-ignore (no fix available). Passing."
            exit 0
          fi

          echo "::error::Unignored vulnerabilities found:"
          echo "$UNIGNORED"
          govulncheck ./...
          exit 1

  # ============================================================================
  # SECRET DETECTION - TruffleHog on full git history
  # ============================================================================
  secret-detection:
    name: Secret Detection
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0  # Full history required for TruffleHog

      - name: TruffleHog Secret Scan
        # renovate: datasource=github-releases depName=trufflesecurity/trufflehog
        uses: trufflesecurity/trufflehog@27b0417c16317ca9a472a9a8092acce143b49c55  # v3.95.9
        with:
          extra_args: --only-verified
